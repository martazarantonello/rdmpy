name: rdmpy
channels:
  - conda-forge
  - defaults
dependencies:
  # pyproject.toml requires Python >=3.8
  - python=3.10
  - pip

  # Core data and plotting stack used across rdmpy
  - pandas>=1.3
  - numpy>=1.21
  - matplotlib>=3.4
  - seaborn>=0.11
  - ipython>=7
  - scipy

  # Parquet backends used by load_data.py and analysis tools
  - pyarrow
  - fastparquet

  # Documentation dependencies (optional but useful to keep env consistent)
  - sphinx>=5
  - sphinx-rtd-theme>=1
  - sphinx-autodoc-typehints>=1.18
  - sphinx-copybutton>=0.5

  # Test tooling
  - pytest

  # Install this repo as an editable package
  - pip:
      - -e .
